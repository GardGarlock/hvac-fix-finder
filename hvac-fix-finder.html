function matchCases(symptomText, selectedTags, unitType, brand) {
  const text = [symptomText, brand].filter(Boolean).join(' ').toLowerCase();
  const scores = HVAC_CASES.map(c => {
    let score = 0;
    // Keyword match in symptom text
    c.symptomKeywords.forEach(kw => {
      if (text.includes(kw.toLowerCase())) score += 3;
    });
    // Tag match
    c.symptomTags.forEach(tag => {
      if (selectedTags.includes(tag)) score += 5;
    });
    // Unit type match
    if (unitType && c.unitTypes.includes(unitType)) score += 2;
    return { case: c, score };
  });

  scores.sort((a, b) => b.score - a.score);
  const best = scores[0];
  if (!best || best.score === 0) return null;
  return best.case;
}

function runDiagnostic(unitType, brand, model, symptomText, selectedTags) {
  const matched = matchCases(symptomText, selectedTags, unitType, brand);
  if (!matched) return null;

  const causes = matched.likelyCauses.slice(0, 3);
  const summary = buildSummary(unitType, brand, model, symptomText, selectedTags, matched);

  return {
    caseTitle: matched.title,
    summary,
    causes,
    safetyFlags: matched.safetyFlags,
    followUpQuestions: matched.followUpQuestions,
    suggestedParts: matched.suggestedParts
  };
}

function buildSummary(unitType, brand, model, symptomText, tags, matched) {
  const unitLabel = unitType ? unitType.charAt(0).toUpperCase() + unitType.slice(1) : 'Unit';
  const brandModel = [brand, model].filter(Boolean).join(' ');
  const tagLabel = tags.length > 0 ? tags.join(', ') : '';
  let desc = `Diagnosed: ${matched.title}`;
  if (brandModel) desc += ` on ${brandModel}`;
  if (unitType) desc += ` (${unitLabel})`;
  if (tagLabel) desc += `. Reported symptoms: ${tagLabel}.`;
  return desc;
}

}

const UNIT_TYPES = ['split system','furnace','condenser','heat pump','mini split','package unit'];

function TroubleshootingForm({ onResults }) {
  const [unitType, setUnitType] = useState('');
  const [brand, setBrand] = useState('');
  const [model, setModel] = useState('');
  const [symptom, setSymptom] = useState('');
  const [tags, setTags] = useState([]);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const toggleTag = chip => setTags(t => t.includes(chip) ? t.filter(x => x !== chip) : [...t, chip]);

  const handleSubmit = async () => {
    if (!symptom.trim() && tags.length === 0) {
      setError('Please describe the symptom.');
      return;
    }
    setError('');

    const runFallback = () => {
      const result = runDiagnostic(unitType, brand, model, symptom, tags);
      if (!result) {
        setError('No matching case found.');
        return;
      }
      onResults({ ...result, source: 'General Knowledge Base' });
    };

    const isCarrier = brand?.toLowerCase().trim() === 'carrier';
    if (!isCarrier) {
      runFallback();
      return;
    }

    setLoading(true);
    try {
      const query = `${symptom} ${tags.join(" ")}`.trim();
      const url = `http://127.0.0.1:8000/diagnose?query=${encodeURIComponent(query)}`;
      
      const response = await fetch(url);
      
      console.log("Fetch Status:", response.status); 

      const data = await response.json();
      console.log("Received Data:", data);

      if (data.results && data.results.length > 0) {
        onResults({
          caseTitle: "Carrier Service Manual Diagnosis",
          source: "Official Carrier Manual",
          summary: `Identified ${data.results.length} matches in Carrier documentation.`,
          causes: data.results.map(r => ({
            name: r.name,
            confidence: r.confidence,
            explanation: r.explanation,
            nextChecks: ["Follow the specific sequence outlined in the manual text."]
          })),
          safetyFlags: ['electrical'],
          suggestedParts: []
        });
      } else {
        runFallback();
      }
    } catch (err) {
      console.error("Diagnostic Error:", err);
      runFallback();
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="space-y-5">
      {/* Unit Type */}
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-2">Unit Type</label>
        <select
          value={unitType}
          onChange={e => setUnitType(e.target.value)}
          className="w-full text-base border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#1A5C3A] bg-white text-gray-700"
        >
          <option value="">Select unit type (optional)</option>
          {UNIT_TYPES.map(u => <option key={u} value={u}>{u.charAt(0).toUpperCase() + u.slice(1)}</option>)}
        </select>
      </div>

      {/* Brand + Model row */}
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">Brand <span className="text-gray-400 font-normal">(optional)</span></label>
          <input
            type="text"
            value={brand}
            onChange={e => setBrand(e.target.value)}
            placeholder="e.g. Carrier, Lennox"
            className="w-full text-base border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#1A5C3A]"
          />
        </div>
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">Model # <span className="text-gray-400 font-normal">(optional)</span></label>
          <input
            type="text"
            value={model}
            onChange={e => setModel(e.target.value)}
            placeholder="e.g. 24ACC636"
            className="w-full text-base border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#1A5C3A]"
          />
        </div>
      </div>

      {/* Symptom textarea */}
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-2">Describe What's Happening</label>
        <textarea
          value={symptom}
          onChange={e => setSymptom(e.target.value)}
          placeholder="Describe what's happening (e.g. AC not cooling, outdoor unit running but warm air inside, started after storm)"
          rows={4}
          className="w-full text-base border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#1A5C3A] resize-none leading-relaxed"
        />
      </div>

      {/* Symptom chips */}
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-2">Quick Symptom Select</label>
        <SymptomChips selected={tags} onToggle={toggleTag} />
      </div>

      {error && <div className="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg p-3">{error}</div>}

      <button
        onClick={handleSubmit}
        disabled={loading}
        className="w-full bg-[#1A5C3A] hover:bg-[#145030] text-white font-bold text-lg py-4 rounded-xl transition-all duration-150 active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed shadow-sm"
      >
        {loading ? (
          <span className="flex items-center justify-center gap-2">
            <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Analyzing…
          </span>
        ) : 'Get Likely Fixes →'}
      </button>
    </div>
  );
}

                  </li>
                ))}
              </ul>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── EmailGate ──────────────────────────────────────────────────
function EmailGate({ onAccess }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const emailValid = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  const handleSubmit = async () => {
    if (!name.trim()) { setError('Please enter your first name.'); return; }
    if (!emailValid(email)) { setError('Please enter a valid email address.'); return; }
    setError('');
    setSubmitting(true);
    // Store in localStorage so they don't have to re-enter
    localStorage.setItem('hvacgate_name', name.trim());
    localStorage.setItem('hvacgate_email', email.trim());
    try {
      const formData = new FormData();
      formData.append('name', name.trim());
      formData.append('email', email.trim());
      formData.append('source', 'HVAC Fix Finder — platformprepared.com');
      formData.append('submitted_at', new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }) + ' PT');
      formData.append('_subject', 'New HVAC Fix Finder Lead — ' + name.trim());
      formData.append('_replyto', email.trim());
      formData.append('_captcha', 'false');
      await fetch('https://formsubmit.co/nate@gardpartners.com', {
        method: 'POST',
        body: formData
      });
    } catch (e) {
      // Fail silently — still grant access so the user isn't blocked
      console.warn('Lead capture failed:', e);
    }
    setSubmitting(false);
    onAccess(name.trim());
  };

  return (
    <div className="min-h-screen bg-[#0D1B2A] flex flex-col items-center justify-center px-4 py-12">
      {/* Logo */}
      <a href="/" className="flex items-center gap-2 mb-8">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="6" fill="#0D1B2A"/>
          <rect x="1" y="21" width="30" height="3" rx="1" fill="#1A5C3A"/>
          <rect x="7" y="9" width="3" height="14" rx="1" fill="#1A5C3A"/>
          <rect x="22" y="9" width="3" height="14" rx="1" fill="#1A5C3A"/>
          <path d="M1 21 L8.5 9 Q16 15.5 23.5 9 L31 21" stroke="#6DC99A" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        </svg>
        <span className="text-white font-bold text-base tracking-wide">Platform Prepared</span>
      </a>

      <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
        {/* Badge */}
        <div className="flex justify-center mb-4">
          <span className="bg-[#1A5C3A]/10 text-[#1A5C3A] text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">Free Tool</span>
        </div>

        <h1 className="text-2xl font-bold text-[#0D1B2A] text-center font-serif mb-1">HVAC Fix Finder</h1>
        <p className="text-gray-500 text-sm text-center mb-6 leading-relaxed">
          Describe your symptoms. Get ranked likely causes, next checks to run, and safety flags — in seconds.
        </p>

        <div className="space-y-3">
          <input
            type="text"
            value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="Your first name"
            className="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-[#1A5C3A]"
          />
          <input
            type="email"
            value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="Your email address"
            className="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-[#1A5C3A]"
          />
          {error && <div className="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg p-3">{error}</div>}
          <button
            onClick={handleSubmit}
            disabled={submitting}
            className="w-full bg-[#1A5C3A] hover:bg-[#145030] text-white font-bold py-4 rounded-xl text-lg transition-all active:scale-95 disabled:opacity-60"
          >
            {submitting ? 'Unlocking…' : 'Get Free Access →'}
          </button>
        </div>

        <p className="text-center text-xs text-gray-400 mt-4 leading-relaxed">
          No spam. We'll occasionally share HVAC ops tips and Platform Prepared updates. Unsubscribe anytime.
        </p>

        {/* Trust signals */}
        <div className="flex justify-center gap-4 mt-5 pt-5 border-t border-gray-100">
          {['8 Case Types','Field-Tested','Safety Flags Built In'].map(t => (
            <div key={t} className="text-center">
              <div className="text-xs text-gray-500">{t}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ── SECTION: App Root ────────────────────────────────────────
   ============================================================ */
function App() {
  const [accessGranted, setAccessGranted] = useState(false);
  const [userName, setUserName] = useState('');

  useEffect(() => {
    // Check localStorage for returning users
    const savedName  = localStorage.getItem('hvacgate_name');
    const savedEmail = localStorage.getItem('hvacgate_email');
    if (savedName && savedEmail) {
      setUserName(savedName);
      setAccessGranted(true);
    }
  }, []);

  const handleAccess = (name) => {
    setUserName(name);
    setAccessGranted(true);
  };

  if (!accessGranted) return <EmailGate onAccess={handleAccess} />;
  return <HVACFixFinderPage userName={userName} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
